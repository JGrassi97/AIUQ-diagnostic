JOBS:

  GET_GROUND_TRUTH:
    CHECK: on_submission
    FILE: templates/copy_eerie_ground.sh,templates/config.yml
    PLATFORM: local
    RUNNING: DATE
    DEPENDENCIES: SYNCHRONIZE

  RESAMPLE_GROUND_TRUTH:
    CHECK: on_submission
    FILE: templates/restore_eerie.sh,templates/config.yml
    PLATFORM: "MARENOSTRUM5ACC"
    RUNNING: DATE
    DEPENDENCIES: GET_GROUND_TRUTH
    NODES: 1
    PROCESSORS: 40
    CUSTOM_DIRECTIVES: "#SBATCH --gres=gpu:1"

  PROBABILISTIC:
    CHECK: on_submission
    FILE: templates/probabilistic.sh,templates/config.yml
    PLATFORM: "MARENOSTRUM5ACC"
    RUNNING: DATE
    DEPENDENCIES: RESAMPLE_GROUND_TRUTH POSTPROCESS SIM
    NODES: 1
    PROCESSORS: 20
    CUSTOM_DIRECTIVES: "#SBATCH --gres=gpu:1"

  DETERMINISTIC:
    CHECK: on_submission
    FILE: templates/deterministic.sh,templates/config.yml
    PLATFORM: "MARENOSTRUM5ACC"
    RUNNING: CHUNK
    DEPENDENCIES: RESAMPLE_GROUND_TRUTH POSTPROCESS SIM PROBABILISTIC
    NODES: 1
    PROCESSORS: 20
    CUSTOM_DIRECTIVES: "#SBATCH --gres=gpu:1"


  MERGER:
    CHECK: on_submission
    FILE: templates/merger.sh,templates/config.yml
    PLATFORM: "MARENOSTRUM5-LOGIN-NOOVERLAP"
    RUNNING: DATE
    DEPENDENCIES: DETERMINISTIC PROBABILISTIC
    NODES: 1
    PROCESSORS: 20
    CUSTOM_DIRECTIVES: "#SBATCH --gres=gpu:1"